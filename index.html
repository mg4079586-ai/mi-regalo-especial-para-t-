<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niño chinito 💚</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #000; color: white; font-family: 'Arial', sans-serif;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #2ecc71; }
        
        .btn-ferxxo {
            background-color: #2ecc71; color: #000; border: none;
            padding: 20px 40px; font-size: 20px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.8);
            transition: 0.3s;
        }
        .btn-ferxxo:hover { transform: scale(1.1); background-color: #fff; }
    </style>
</head>
<body>

    <h1>Tengo algo especial para ti... 💚</h1>

    <button class="btn-ferxxo" onclick="empezarRegalo()">
        💚 Dale play, mi niño 💚
    </button>

    <!-- El reproductor busca el archivo musica.mp3 que ya tienes en tu repo -->
    <audio id="cancion" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function empezarRegalo() {
            var audio = document.getElementById("cancion");
            
            // Intenta reproducir el audio local
            audio.play().catch(function(error) {
                console.log("El audio local no pudo iniciar, pero el link de Canva también tiene música.");
            });
            
            // Espera 3 segundos y abre el nuevo link de Canva en una pestaña nueva
            setTimeout(function(){
                window.open("https://www.canva.com/design/DAHEK9OhG2M/PhYSgHm92-PXVqxF_dON6g/watch?utm_content=DAHEK9OhG2M&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=hfa9a6aa282", "_blank");
            }, 3000);
        }
    </script>
</body>
</html>

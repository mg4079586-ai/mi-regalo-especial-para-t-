<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niño chinito 💚</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #000; color: white; font-family: 'Arial', sans-serif;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #2ecc71; }
        
        .btn-ferxxo {
            background-color: #2ecc71; color: #000; border: none;
            padding: 20px 40px; font-size: 20px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.8);
            transition: 0.3s;
        }
        .btn-ferxxo:hover { transform: scale(1.1); background-color: #fff; }
    </style>
</head>
<body>

    <h1>Tengo algo especial para ti... 💚</h1>

    <button class="btn-ferxxo" onclick="empezarRegalo()">
        💚 Dale play, mi niño 💚
    </button>

    <!-- El reproductor busca el archivo musica.mp3 que ya subiste -->
    <audio id="cancion" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function empezarRegalo() {
            var audio = document.getElementById("cancion");
            audio.play();
            
            // Espera 2 segundos para que escuche el inicio del Fercho y luego abre Canva
            setTimeout(function(){
                window.location.href = "https://unnuevoregalo.my.canva.site";
            }, 2500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niño chinito 💚</title>
    <style>
        /* Pantalla completa para el diseño de Canva */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Botón estilo Ferxxo */
        .btn-ferxxo {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2ecc71; /* Verde neón */
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 0px 20px rgba(46, 204, 113, 0.6);
            z-index: 1000;
            transition: 0.3s;
            font-family: 'Arial', sans-serif;
        }
        .btn-ferxxo:hover { transform: translateX(-50%) scale(1.1); background-color: #27ae60; }
    </style>
</head>
<body>

    <!-- Tu diseño de Canva cargando de fondo -->
    <iframe src="https://unnuevoregalo.my.canva.site"></iframe>

    <!-- Botón flotante -->
    <button class="btn-ferxxo" onclick="tocarMusica()" id="botonMusica">
        💚 Dale play, mi niño 💚
    </button>

    <!-- El reproductor invisible -->
    <audio id="cancion" loop>
        <!-- RECUERDA SUBIR EL ARCHIVO MP3 CON ESTE NOMBRE EXACTO -->
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function tocarMusica() {
            var audio = document.getElementById("cancion");
            var btn = document.getElementById("botonMusica");
            
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "⏸ Pausar Fercho";
                btn.style.backgroundColor = "#fff"; 
            } else {
                audio.pause();
                btn.innerHTML = "💚 Dale play, mi niño 💚";
                btn.style.backgroundColor = "#2ecc71";
            }
        }
    </script>

</body>
</html>
